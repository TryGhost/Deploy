name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20.20.0 is the lowest runtime a consumer pins; 22 and 24 must keep working too.
        node-version: ['20.20.0', '22', '24']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker compose -f test/e2e/docker-compose.yml up --build --abort-on-container-exit --exit-code-from runner

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  all-tests-pass:
    name: All tests pass
    if: always()
    needs: [lint, test, e2e, build]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job did not succeed
        run: |
          results="${{ needs.lint.result }} ${{ needs.test.result }} ${{ needs.e2e.result }} ${{ needs.build.result }}"
          echo "Job results: ${results}"
          # Guard against a renamed/removed needs job leaving an empty result.
          if [ "$(echo ${results} | wc -w)" -ne 4 ]; then
            echo "::error::expected 4 job results, got '${results}'"
            exit 1
          fi
          for result in ${results}; do
            if [ "${result}" != "success" ]; then
              echo "::error::A required job did not succeed (got '${result:-<empty>}')"
              exit 1
            fi
          done
          echo "All required jobs succeeded"
