name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.20.0
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20.20.0 is the lowest runtime a consumer pins; 22 and 24 must keep working too.
        node-version: ['20.20.0', '22', '24']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: yarn install --frozen-lockfile
      - run: yarn test:unit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: docker compose -f test/e2e/docker-compose.yml up --build --abort-on-container-exit --exit-code-from runner

  all-tests-pass:
    name: All tests pass
    if: always()
    needs: [lint, test, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job did not succeed
        run: |
          results="${{ needs.lint.result }} ${{ needs.test.result }} ${{ needs.e2e.result }}"
          echo "Job results: ${results}"
          # Guard against a renamed/removed needs job leaving an empty result.
          if [ "$(echo ${results} | wc -w)" -ne 3 ]; then
            echo "::error::expected 3 job results, got '${results}'"
            exit 1
          fi
          for result in ${results}; do
            if [ "${result}" != "success" ]; then
              echo "::error::A required job did not succeed (got '${result:-<empty>}')"
              exit 1
            fi
          done
          echo "All required jobs succeeded"
